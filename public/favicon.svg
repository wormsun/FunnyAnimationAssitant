<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- 渐变定义（蓝色系）-->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="58" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
  
  <!-- 摄像机图标 (放大版本) -->
  <g transform="translate(64, 64)">
    <!-- 摄像机机身 -->
    <rect x="-24" y="-16" width="36" height="26" rx="3" fill="white" opacity="0.9"/>
    <!-- 镜头 -->
    <circle cx="-6" cy="-3" r="9" fill="white" opacity="0.95"/>
    <circle cx="-6" cy="-3" r="5" fill="url(#iconGradient)"/>
    <!-- 录制指示灯 -->
    <circle cx="8" cy="-11" r="3.5" fill="#ff4444"/>
    <!-- 播放按钮 -->
    <polygon points="18,-10 18,6 32,-2" fill="white" opacity="0.9"/>
  </g>
</svg>
